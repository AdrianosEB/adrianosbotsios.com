<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EEF1FA"/>
      <stop offset="100%" stop-color="#C9D4F0"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#FFFFFF" fill-opacity="0.35"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#g)"/>
  <rect width="800" height="600" fill="url(#dots)"/>
  <g font-family="Inter, system-ui, sans-serif" fill="#3F4A6B" text-anchor="middle">
    <text x="400" y="295" font-size="22" font-weight="600" letter-spacing="0.5">Project image</text>
    <text x="400" y="325" font-size="14" fill-opacity="0.7">replace with a photo from assets/projects/</text>
  </g>
</svg>
